<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Lisa ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      text-align: center;
      overflow-x: hidden;
      min-height: 200vh; /* Ensures there is room to scroll */
    }

    .section {
      padding: 100px 20px;
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s ease;
    }

    .visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card {
      background: rgba(0,0,0,0.3);
      padding: 30px;
      border-radius: 20px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      min-height: 50px;
    }

    .typing {
      border-right: 3px solid white;
      display: inline-block;
      animation: blink 0.7s infinite;
      font-size: 1.5rem;
    }

    @keyframes blink {
      0%, 100% { border-color: white; }
      50% { border-color: transparent; }
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes { background-color: #4CAF50; color: white; }
    .no { background-color: #f44336; color: white; position: absolute; }

    .quiz button { display: block; margin: 10px auto; }

    .start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000dd;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      flex-direction: column;
    }

    .start-screen button {
      background: #ff7eb3;
      color: white;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="start-screen" id="startScreen">
    <h2>For Lisa ❤️</h2>
    <button onclick="startExperience()">Start Our Story</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="section">
    <h1>Our Story ❤️</h1>
    <div class="card">
      <p class="typing" data-text="📩 The day I took a risk and texted you on TikTok..."></p>
    </div>
  </div>

  <div class="section">
    <div class="card">
      <p class="typing" data-text="✨ The moment you replied... and everything changed a little"></p>
    </div>
  </div>

  <div class="section">
    <div class="card">
      <p class="typing" data-text="💭 The moment I realized... I actually like you"></p>
    </div>
  </div>

  <div class="section">
    <h2>Before we continue... 😌</h2>
    <div class="card quiz" id="quiz">
      <p>How well do you know me?</p>
      <button onclick="correctAnswer()">I like you</button>
      <button onclick="wrongAnswer()">I don't like you</button>
    </div>
  </div>

  <div class="section" id="proposal" style="display:none;">
    <div class="card">
      <h2>Will you be my girlfriend? 💕</h2>
      <button class="yes" onclick="sayYes()">Yes ❤️</button>
      <button class="no" id="noBtn">No 😢</button>
    </div>
  </div>

  <script>
    // Intersection Observer to detect when text comes into view
    const observerOptions = { threshold: 0.5 };
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          const typingText = entry.target.querySelector('.typing');
          if (typingText && !typingText.classList.contains('started')) {
            typeText(typingText);
            typingText.classList.add('started');
          }
        }
      });
    }, observerOptions);

    document.querySelectorAll('.section').forEach(sec => observer.observe(sec));

    function typeText(element) {
      const rawText = element.getAttribute('data-text');
      const words = rawText.split(' ');
      let wordIndex = 0;

      function typeWord() {
        if (wordIndex < words.length) {
          element.innerHTML += words[wordIndex] + ' ';
          wordIndex++;
          setTimeout(typeWord, 150); 
        } else {
          element.style.borderRight = "none"; // Hide cursor when done
        }
      }
      typeWord();
    }

    function startExperience() {
      document.getElementById('startScreen').style.display = 'none';
      const music = document.getElementById('bgMusic');
      music.play().catch(e => console.log("Audio needs user interaction"));
      window.scrollTo(0,0);
    }

    function correctAnswer() {
      document.getElementById('quiz').innerHTML = "<p>Okay okay... you got that right 😄</p>";
      setTimeout(() => {
        const prop = document.getElementById('proposal');
        prop.style.display = 'block';
        prop.classList.add('visible');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }, 1000);
    }

    function wrongAnswer() {
      alert("Hmm... try again 😅");
    }

    function sayYes() {
      document.body.innerHTML = "<div style='display:flex; justify-content:center; align-items:center; height:100vh;'><h1>You just made me the happiest person ❤️</h1></div>";
    }

    const noBtn = document.getElementById('noBtn');
    noBtn.addEventListener('mouseover', () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    });
  </script>

</body>
</html>
